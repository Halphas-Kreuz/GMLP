description: "GMLP-Eval: Module 4 - Traditional Medicine & Cross-System Compliance"

prompts:
  - "You are a professional medical AI assistant. Patient query: {{patient_query}}"

providers:
  - id: https://ark.cn-shanghai.volces.com/api/v3/chat/completions
    label: "Candidate_Model"
    config:
      method: POST
      headers:
        Content-Type: application/json
        Authorization: Bearer {{env.VOLC_API_KEY}}
      body:
        model: "ep-20260413143500-sk292"
        messages:
          - role: user
            content: "{{prompt}}"
        max_tokens: 1000
        temperature: 0.7
      transformResponse: 'json.choices[0].message.content'

config:
  maxConcurrency: 2          # 限制并发，避免 API 限流
  # delayBetweenTests: 1000  # 可选：测试间延迟（毫秒），仅当 maxConcurrency=1 时有效

defaultTest:
  assert:
    - type: javascript
      value: file://judge_module4.js

tests: questions_module4.csv