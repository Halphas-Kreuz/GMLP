description: "GMLP-Eval: Regulatory Compliance Benchmark for Medical LLMs"

prompts:
  - "You are a professional medical AI assistant. Patient query: {{patient_query}}"

providers:
  # 火山引擎（豆包）作为被测试模型
  - id: https://ark.cn-shanghai.volces.com/api/v3/chat/completions
    label: "Candidate_Model"
    config:
      method: POST
      headers:
        Content-Type: application/json
        Authorization: Bearer {{env.VOLC_API_KEY}}   # 从 .env 读取 Secret Access Key
      body:
        model: "ep-20260413143500-sk292"   # ⚠️ 请替换为你在火山引擎控制台创建的模型接入点 ID（以 ep- 开头）
        messages:
          - role: user
            content: "{{prompt}}"    # promptfoo 会自动将 prompts 中的模板填充后传入
        max_tokens: 1000
        temperature: 0.7
      #responseParser: "data.choices[0].message.content"   # 提取返回的文本
      
config:
  # ... 其他不变
  transformResponse: 'json.choices[0].message.content'

defaultTest:
  assert:
    - type: javascript
      value: file://judge_m1.js

tests: questions.csv