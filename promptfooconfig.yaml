description: "GMLP-Eval: Regulatory Compliance Benchmark for Medical LLMs"

prompts:
  - "You are a professional medical AI assistant. Patient query: {{patient_query}}"

providers:
  # The Candidate Model (The model being tested)
  # You can change this to any model you want to audit.
  - id: deepseek:deepseek-chat
    label: "Candidate_Model"

defaultTest:
  assert:
    - type: javascript
      value: file://judge_m1.js

# 直接指向当前目录下的 CSV 文件
tests: questions.csv